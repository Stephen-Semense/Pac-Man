<!DOCTYPE html>
<html>
<head>
    <title>PAC-MAN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        body {
            text-align: center;
            background-color: #111;
            margin: 0;
            padding: 20px;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* Landing Page Styles */
        #landingPage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
        }
        
        .game-title {
            font-size: 72px;
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00, 0 0 40px #ffff00;
            margin-bottom: 50px;
            animation: pulse 2s infinite;
            letter-spacing: 10px;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .difficulty-container {
            margin-bottom: 40px;
        }
        
        .difficulty-title {
            color: white;
            font-size: 28px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .difficulty-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .diff-btn {
            padding: 15px 40px;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border: 3px solid;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .diff-btn.easy {
            color: #00ff00;
            border-color: #00ff00;
            box-shadow: 0 0 10px #00ff00;
        }
        
        .diff-btn.easy:hover, .diff-btn.easy.selected {
            background: #00ff00;
            color: black;
            box-shadow: 0 0 30px #00ff00;
        }
        
        .diff-btn.normal {
            color: #ffff00;
            border-color: #ffff00;
            box-shadow: 0 0 10px #ffff00;
        }
        
        .diff-btn.normal:hover, .diff-btn.normal.selected {
            background: #ffff00;
            color: black;
            box-shadow: 0 0 30px #ffff00;
        }
        
        .diff-btn.hard {
            color: #ff0000;
            border-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }
        
        .diff-btn.hard:hover, .diff-btn.hard.selected {
            background: #ff0000;
            color: black;
            box-shadow: 0 0 30px #ff0000;
        }
        
        .play-btn {
            padding: 20px 80px;
            font-size: 36px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            background: linear-gradient(45deg, #2121de, #0000aa);
            color: white;
            border: 4px solid #2121de;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 5px;
            box-shadow: 0 0 20px #2121de;
        }
        
        .play-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 0 40px #2121de;
        }
        
        .play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Game Container */
        #gameContainer {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            color: #ffff00;
            text-shadow: 0 0 30px #ffff00;
            z-index: 100;
            display: none;
        }
        
        #board {
            background-color: black;
            border: 4px solid #2121de;
            box-shadow: 0 0 20px #2121de;
        }
        
        #score {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        #level-display {
            color: #00ffff;
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        #lives {
            color: white;
            font-size: 20px;
            margin-top: 10px;
        }
        
        .controls-info {
            color: #888;
            margin-top: 20px;
            font-size: 16px;
        }
        
        .back-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            background: transparent;
            color: white;
            border: 2px solid white;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        
        .back-btn:hover {
            background: white;
            color: black;
        }
        
        /* Modal Styles - Shared for Game Over and Victory */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 200;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 4px solid;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px, 0 0 100px;
            animation: modalPop 0.3s ease-out;
        }
        
        @keyframes modalPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .modal-title {
            font-size: 48px;
            text-shadow: 0 0 20px, 0 0 40px;
            margin-bottom: 20px;
            letter-spacing: 5px;
            animation: flicker 1.5s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .final-score {
            font-size: 28px;
            color: #ffff00;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #ffff00;
        }
        
        .modal-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .modal-btn {
            padding: 15px 40px;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border: 3px solid;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            border-radius: 10px;
        }
        
        .retry-btn {
            color: #00ff00;
            border-color: #00ff00;
            box-shadow: 0 0 15px #00ff00;
        }
        
        .retry-btn:hover {
            background: #00ff00;
            color: black;
            box-shadow: 0 0 30px #00ff00;
            transform: scale(1.05);
        }
        
        .menu-btn {
            color: #ffff00;
            border-color: #ffff00;
            box-shadow: 0 0 15px #ffff00;
        }
        
        .menu-btn:hover {
            background: #ffff00;
            color: black;
            box-shadow: 0 0 30px #ffff00;
            transform: scale(1.05);
        }
        
        /* Game Over Specific */
        #gameOverModal .modal-content {
            border-color: #ff0000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5), 0 0 100px rgba(255, 0, 0, 0.3);
        }
        
        #gameOverModal .modal-title {
            color: #ff0000;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
        }
        
        /* Victory Specific */
        #victoryModal .modal-content {
            border-color: #00ff00;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.5), 0 0 100px rgba(0, 255, 0, 0.3);
        }
        
        #victoryModal .modal-title {
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
        }
        
        /* Joystick - Hidden by default on desktop */
        #joystick-container {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            z-index: 50;
        }
        
        .joystick-base {
            position: absolute;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            backdrop-filter: blur(5px);
        }
        
        .joystick-stick {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ffff00 0%, #ffcc00 100%);
            border: 3px solid #ff9900;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
            transition: none;
        }
        
        .joystick-stick.active {
            background: radial-gradient(circle, #00ff00 0%, #00cc00 100%);
            border-color: #009900;
        }
        
        .joystick-arrow {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
            opacity: 0.3;
        }
        
        .arrow-up {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 15px 20px 15px;
            border-color: transparent transparent white transparent;
        }
        
        .arrow-down {
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 20px 15px 0 15px;
            border-color: white transparent transparent transparent;
        }
        
        .arrow-left {
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 15px 20px 15px 0;
            border-color: transparent white transparent transparent;
        }
        
        .arrow-right {
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 15px 0 15px 20px;
            border-color: transparent transparent transparent white;
        }
        
        .mobile-instructions {
            display: none;
            color: #888;
            margin-top: 10px;
            font-size: 16px;
        }
        
        /* ==================== MOBILE MEDIA QUERIES ONLY ==================== */
        
        /* Mobile devices (max-width: 768px) */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
                overflow: hidden;
            }
            
            .game-title {
                font-size: 48px;
                letter-spacing: 6px;
                margin-bottom: 30px;
            }
            
            .difficulty-container {
                margin-bottom: 25px;
            }
            
            .difficulty-title {
                font-size: 22px;
                margin-bottom: 15px;
            }
            
            .difficulty-buttons {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .diff-btn {
                padding: 12px 25px;
                font-size: 18px;
                min-width: 100px;
            }
            
            .play-btn {
                padding: 16px 50px;
                font-size: 24px;
                letter-spacing: 3px;
            }
            
            #gameContainer {
                width: 100%;
                height: 100vh;
                position: relative;
                justify-content: flex-start;
                padding-top: 10px;
            }
            
            #score {
                font-size: 18px;
                margin-bottom: 5px;
            }
            
            #level-display {
                font-size: 16px;
            }
            
            #lives {
                font-size: 14px;
                margin-top: 5px;
            }
            
            .controls-info {
                display: none;
            }
            
            .mobile-instructions {
                display: block;
            }
            
            /* Show joystick on mobile */
            #joystick-container {
                display: block;
                bottom: 20px;
            }
            
            /* Scale canvas for mobile */
            #board {
                max-width: 95vw;
                max-height: 50vh;
                height: auto;
                border-width: 2px;
            }
            
            #countdown {
                font-size: 80px;
            }
            
            .back-btn {
                padding: 8px 20px;
                font-size: 14px;
                margin-top: 10px;
            }
            
            /* Mobile modal adjustments */
            .modal-content {
                padding: 30px 20px;
                margin: 20px;
            }
            
            .modal-title {
                font-size: 36px;
            }
            
            .final-score {
                font-size: 22px;
            }
            
            .modal-btn {
                padding: 12px 30px;
                font-size: 20px;
            }
        }
        
        /* Small mobile devices (max-width: 480px) */
        @media screen and (max-width: 480px) {
            .game-title {
                font-size: 36px;
                letter-spacing: 4px;
                margin-bottom: 20px;
            }
            
            .difficulty-title {
                font-size: 18px;
                margin-bottom: 10px;
            }
            
            .difficulty-buttons {
                gap: 10px;
            }
            
            .diff-btn {
                padding: 10px 20px;
                font-size: 16px;
                min-width: 90px;
                border-width: 2px;
            }
            
            .play-btn {
                padding: 14px 40px;
                font-size: 20px;
                border-width: 3px;
            }
            
            #joystick-container {
                width: 120px;
                height: 120px;
                bottom: 15px;
            }
            
            .joystick-base {
                width: 120px;
                height: 120px;
            }
            
            .joystick-stick {
                width: 50px;
                height: 50px;
            }
            
            .arrow-up {
                top: 8px;
                border-width: 0 12px 16px 12px;
            }
            
            .arrow-down {
                bottom: 8px;
                border-width: 16px 12px 0 12px;
            }
            
            .arrow-left {
                left: 8px;
                border-width: 12px 16px 12px 0;
            }
            
            .arrow-right {
                right: 8px;
                border-width: 12px 0 12px 16px;
            }
            
            #board {
                max-height: 45vh;
            }
            
            #countdown {
                font-size: 60px;
            }
            
            .modal-title {
                font-size: 28px;
            }
            
            .final-score {
                font-size: 18px;
            }
            
            .modal-btn {
                padding: 10px 25px;
                font-size: 18px;
            }
        }
        
        /* Very small mobile devices (max-width: 320px) */
        @media screen and (max-width: 320px) {
            .game-title {
                font-size: 28px;
                letter-spacing: 2px;
            }
            
            .diff-btn {
                padding: 8px 15px;
                font-size: 14px;
                min-width: 80px;
            }
            
            .play-btn {
                padding: 12px 30px;
                font-size: 18px;
            }
            
            #joystick-container {
                width: 100px;
                height: 100px;
                bottom: 10px;
            }
            
            .joystick-base {
                width: 100px;
                height: 100px;
            }
            
            .joystick-stick {
                width: 40px;
                height: 40px;
            }
        }
        
        /* Mobile landscape orientation */
        @media screen and (max-height: 500px) and (orientation: landscape) and (max-width: 768px) {
            #landingPage {
                flex-direction: row;
                flex-wrap: wrap;
                padding: 10px;
            }
            
            .game-title {
                font-size: 32px;
                width: 100%;
                margin-bottom: 10px;
            }
            
            .difficulty-container {
                width: 60%;
                margin-bottom: 0;
            }
            
            .difficulty-buttons {
                flex-direction: column;
                gap: 8px;
            }
            
            .diff-btn {
                padding: 8px 20px;
                font-size: 14px;
            }
            
            .play-btn {
                padding: 12px 30px;
                font-size: 18px;
            }
            
            #gameContainer {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                align-content: center;
                padding-top: 0;
            }
            
            #board {
                max-height: 80vh;
                width: auto;
                order: 1;
            }
            
            #score, #level-display, #lives {
                width: 30%;
                order: 0;
            }
            
            #joystick-container {
                position: relative;
                bottom: auto;
                left: auto;
                transform: none;
                order: 2;
                margin-left: 20px;
            }
            
            .back-btn {
                position: absolute;
                top: 10px;
                right: 10px;
                margin-top: 0;
            }
            
            .modal-content {
                padding: 25px;
            }
            
            .modal-title {
                font-size: 32px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Landing Page -->
    <div id="landingPage">
        <h1 class="game-title">PAC-MAN</h1>
        
        <div class="difficulty-container">
            <div class="difficulty-title">Select Difficulty</div>
            <div class="difficulty-buttons">
                <button class="diff-btn easy" onclick="selectDifficulty('easy')">Easy</button>
                <button class="diff-btn normal" onclick="selectDifficulty('normal')">Normal</button>
                <button class="diff-btn hard" onclick="selectDifficulty('hard')">Hard</button>
            </div>
        </div>
        
        <button id="playBtn" class="play-btn" onclick="startGame()" disabled>PLAY</button>
        
        <div class="controls-info">
            Use WASD or Arrow Keys to Move
        </div>
        <div class="mobile-instructions">
            Use the joystick below to move Pac-Man
        </div>
    </div>

    <!-- Game Container -->
    <div id="gameContainer">
        <div id="countdown">3</div>
        <div id="score">SCORE: 0</div>
        <div id="level-display">LEVEL: 1</div>
        <canvas id="board"></canvas>
        <div id="lives">LIVES: ❤️❤️❤️</div>
        <button class="back-btn" onclick="backToMenu()">Back to Menu</button>
        
        <!-- Virtual Joystick - Only visible on mobile -->
        <div id="joystick-container">
            <div class="joystick-base">
                <div class="joystick-arrow arrow-up"></div>
                <div class="joystick-arrow arrow-down"></div>
                <div class="joystick-arrow arrow-left"></div>
                <div class="joystick-arrow arrow-right"></div>
            </div>
            <div class="joystick-stick" id="joystickStick"></div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">GAME OVER</div>
            <div class="final-score" id="finalScoreGameOver">SCORE: 0</div>
            <div class="modal-buttons">
                <button class="modal-btn retry-btn" onclick="retryGame()">RETRY</button>
                <button class="modal-btn menu-btn" onclick="backToMenuFromModal()">MENU</button>
            </div>
        </div>
    </div>

    <!-- Victory Modal -->
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">YOU WIN!</div>
            <div class="final-score" id="finalScoreVictory">SCORE: 0</div>
            <div class="modal-buttons">
                <button class="modal-btn retry-btn" onclick="nextLevel()">NEXT LEVEL</button>
                <button class="modal-btn menu-btn" onclick="backToMenuFromModal()">MENU</button>
            </div>
        </div>
    </div>

    <script>
        let board;
        let rowCount = 21;
        let columnCount = 19;
        const tileSize = 32;
        const boardWidth = columnCount * tileSize;
        const boardHeight = rowCount * tileSize;
        let context;

        // Game state
        let selectedDifficulty = null;
        let gameRunning = false;
        let countdownActive = false;
        let score = 0;
        let lives = 3;
        let frameCount = 0;
        let level = 1;
        let baseDifficulty = null; // Store original difficulty settings

        // Joystick state
        let joystickActive = false;
        let joystickCenter = {x: 0, y: 0};
        let joystickMaxDistance = 35;
        let joystickDirection = {x: 0, y: 0};

        // Difficulty settings
        const difficulties = {
            easy: {
                ghostSpeed: 1.2,
                ghostCount: 2,
                frightenedTime: 8000,
                scatterTime: 10000,
                chaseTime: 15000
            },
            normal: {
                ghostSpeed: 1.8,
                ghostCount: 3,
                frightenedTime: 6000,
                scatterTime: 7000,
                chaseTime: 20000
            },
            hard: {
                ghostSpeed: 2.2,
                ghostCount: 4,
                frightenedTime: 4000,
                scatterTime: 5000,
                chaseTime: 25000
            }
        };

        let currentDifficulty = null;
        let maze = [];
        
        let pacman = {
            x: 0,
            y: 0,
            dir: {x: 0, y: 0},
            nextDir: {x: 0, y: 0},
            speed: 2.5,
            mouthOpen: 0,
            mouthSpeed: 0.2
        };

        let ghosts = [];
        let dots = [];
        let powerPellets = [];
        let particles = [];

        const ghostTypes = [
            {name: 'blinky', color: '#ff0000', scatterX: 17, scatterY: 1},
            {name: 'pinky', color: '#ffb8ff', scatterX: 1, scatterY: 1},
            {name: 'inky', color: '#00ffff', scatterX: 17, scatterY: 19},
            {name: 'clyde', color: '#ffb852', scatterX: 1, scatterY: 19}
        ];

        let currentMode = 'scatter';
        let modeTimer = 0;
        let frightenedTimer = 0;
        let currentWave = 0;

        window.onload = function() {
            board = document.getElementById("board");
            board.height = boardHeight;
            board.width = boardWidth;
            context = board.getContext("2d");
            
            // Only setup mobile features if on mobile
            if (window.innerWidth <= 768) {
                setupMobile();
            }
            
            setupJoystick();
        };

        function setupMobile() {
            window.addEventListener('resize', resizeCanvasMobile);
        }

        function resizeCanvasMobile() {
            if (window.innerWidth > 768) return;
            
            const maxWidth = window.innerWidth - 20;
            const maxHeight = window.innerHeight * 0.5;
            
            let scale = Math.min(maxWidth / boardWidth, maxHeight / boardHeight, 1);
            
            board.style.width = (boardWidth * scale) + 'px';
            board.style.height = (boardHeight * scale) + 'px';
        }

        function setupJoystick() {
            const joystickContainer = document.getElementById('joystick-container');
            const joystickStick = document.getElementById('joystickStick');
            
            const handleStart = (e) => {
                e.preventDefault();
                if (!gameRunning || countdownActive) return;
                
                joystickActive = true;
                const rect = joystickContainer.getBoundingClientRect();
                joystickCenter = {
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2
                };
                
                joystickStick.classList.add('active');
                handleMove(e);
            };
            
            const handleMove = (e) => {
                if (!joystickActive) return;
                e.preventDefault();
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                let deltaX = clientX - joystickCenter.x;
                let deltaY = clientY - joystickCenter.y;
                
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                
                if (distance > joystickMaxDistance) {
                    const ratio = joystickMaxDistance / distance;
                    deltaX *= ratio;
                    deltaY *= ratio;
                }
                
                joystickStick.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
                
                const threshold = 10;
                if (Math.abs(deltaX) > threshold || Math.abs(deltaY) > threshold) {
                    if (Math.abs(deltaX) > Math.abs(deltaY)) {
                        joystickDirection = {x: deltaX > 0 ? 1 : -1, y: 0};
                    } else {
                        joystickDirection = {x: 0, y: deltaY > 0 ? 1 : -1};
                    }
                    pacman.nextDir = joystickDirection;
                }
            };
            
            const handleEnd = (e) => {
                e.preventDefault();
                joystickActive = false;
                joystickStick.style.transform = 'translate(-50%, -50%)';
                joystickStick.classList.remove('active');
                joystickDirection = {x: 0, y: 0};
            };
            
            joystickContainer.addEventListener('touchstart', handleStart, {passive: false});
            document.addEventListener('touchmove', handleMove, {passive: false});
            document.addEventListener('touchend', handleEnd);
            document.addEventListener('touchcancel', handleEnd);
            
            joystickContainer.addEventListener('mousedown', handleStart);
            document.addEventListener('mousemove', handleMove);
            document.addEventListener('mouseup', handleEnd);
        }

        function selectDifficulty(diff) {
            selectedDifficulty = diff;
            // Store base difficulty for level progression
            baseDifficulty = JSON.parse(JSON.stringify(difficulties[diff]));
            currentDifficulty = JSON.parse(JSON.stringify(difficulties[diff]));
            
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.querySelector('.' + diff).classList.add('selected');
            
            document.getElementById('playBtn').disabled = false;
        }

        function startGame() {
            if (!selectedDifficulty) return;
            
            document.getElementById('landingPage').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            
            if (window.innerWidth <= 768) {
                resizeCanvasMobile();
            }
            
            initGame();
            startCountdown();
        }

        function startCountdown() {
            countdownActive = true;
            let count = 3;
            const countdownEl = document.getElementById('countdown');
            countdownEl.style.display = 'block';
            countdownEl.textContent = count;
            
            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.textContent = count;
                } else if (count === 0) {
                    countdownEl.textContent = 'GO!';
                } else {
                    clearInterval(interval);
                    countdownEl.style.display = 'none';
                    countdownActive = false;
                    gameRunning = true;
                    gameLoop();
                }
            }, 1000);
        }

        // Flood fill to check connectivity
        function floodFill(startR, startC, mazeCopy, visited) {
            let stack = [[startR, startC]];
            visited[startR][startC] = true;
            let reachable = 1;
            
            while (stack.length > 0) {
                let [r, c] = stack.pop();
                
                const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
                for (let [dr, dc] of dirs) {
                    let nr = r + dr;
                    let nc = c + dc;
                    
                    if (nr >= 0 && nr < rowCount && nc >= 0 && nc < columnCount && 
                        !visited[nr][nc] && mazeCopy[nr][nc] !== 1) {
                        visited[nr][nc] = true;
                        stack.push([nr, nc]);
                        reachable++;
                    }
                }
            }
            return reachable;
        }

        // Check if all empty spaces are reachable from Pac-Man spawn
        function isMazeValid(mazeCopy) {
            let visited = Array(rowCount).fill().map(() => Array(columnCount).fill(false));
            let reachable = floodFill(15, 9, mazeCopy, visited);
            
            let totalEmpty = 0;
            for (let r = 0; r < rowCount; r++) {
                for (let c = 0; c < columnCount; c++) {
                    if (mazeCopy[r][c] !== 1) totalEmpty++;
                }
            }
            
            return reachable === totalEmpty;
        }

        // Ensure critical paths are clear
        function ensureCriticalPaths() {
            // Clear area around Pac-Man spawn
            const spawnArea = [
                [15, 9], [15, 8], [15, 10],
                [14, 9], [14, 8], [14, 10],
                [16, 9], [16, 8], [16, 10]
            ];
            
            for (let [r, c] of spawnArea) {
                if (r >= 0 && r < rowCount && c >= 0 && c < columnCount) {
                    maze[r][c] = 0;
                }
            }
            
            // Ensure ghost house exit is clear
            maze[9][9] = 2;
            maze[8][9] = 0;
            maze[7][9] = 0;
            
            // Clear tunnels
            maze[10][0] = 2;
            maze[10][columnCount - 1] = 2;
            maze[10][1] = 0;
            maze[10][columnCount - 2] = 0;
            
            // Ensure power pellet corners are accessible
            const corners = [[1, 1], [1, 17], [19, 1], [19, 17]];
            for (let [r, c] of corners) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        let nr = r + dr;
                        let nc = c + dc;
                        if (nr >= 0 && nr < rowCount && nc >= 0 && nc < columnCount && maze[nr][nc] !== 1) {
                            maze[nr][nc] = 0;
                        }
                    }
                }
            }
        }

        function generateMaze() {
            let attempts = 0;
            let maxAttempts = 100;
            let validMaze = false;
            
            while (!validMaze && attempts < maxAttempts) {
                maze = [];
                for (let r = 0; r < rowCount; r++) {
                    maze[r] = [];
                    for (let c = 0; c < columnCount; c++) {
                        if (r === 0 || r === rowCount - 1 || c === 0 || c === columnCount - 1) {
                            maze[r][c] = 1;
                        } else {
                            maze[r][c] = 0;
                        }
                    }
                }
                
                // Generate walls with constraints
                const wallCount = Math.floor((rowCount * columnCount) * 0.18); // Reduced for more open maze
                let wallsPlaced = 0;
                
                while (wallsPlaced < wallCount) {
                    let r = Math.floor(Math.random() * (rowCount - 2)) + 1;
                    let c = Math.floor(Math.random() * (columnCount - 2)) + 1;
                    
                    // Don't block critical areas
                    if ((r >= 13 && r <= 17 && c >= 7 && c <= 11) || // Extended Pac-man spawn area
                        (r >= 7 && r <= 12 && c >= 7 && c <= 11) || // Ghost house area
                        (r === 10 && (c <= 3 || c >= columnCount - 4)) || // Tunnel area
                        maze[r][c] === 1) {
                        continue;
                    }
                    
                    // Check if it would create a dead end or isolate area
                    let neighbors = 0;
                    if (maze[r-1][c] === 1) neighbors++;
                    if (maze[r+1][c] === 1) neighbors++;
                    if (maze[r][c-1] === 1) neighbors++;
                    if (maze[r][c+1] === 1) neighbors++;
                    
                    if (neighbors >= 3) continue;
                    
                    maze[r][c] = 1;
                    wallsPlaced++;
                }
                
                // Ensure ghost house
                for (let r = 9; r <= 11; r++) {
                    for (let c = 8; c <= 10; c++) {
                        if (r === 9 && c === 9) {
                            maze[r][c] = 2;
                        } else if (r === 10 && (c === 8 || c === 10)) {
                            maze[r][c] = 4;
                        } else if (r === 11 && c === 9) {
                            maze[r][c] = 4;
                        } else if (r >= 9 && r <= 11 && c >= 8 && c <= 10) {
                            maze[r][c] = 2;
                        }
                    }
                }
                
                ensureCriticalPaths();
                
                if (isMazeValid(maze)) {
                    validMaze = true;
                }
                
                attempts++;
            }
            
            if (!validMaze) {
                createGuaranteedValidMaze();
            }
            
            // Place power pellets
            const corners = [[1, 1], [1, 17], [19, 1], [19, 17]];
            corners.forEach(([r, c]) => {
                if (maze[r][c] === 0) maze[r][c] = 3;
            });
        }

        function createGuaranteedValidMaze() {
            maze = [];
            for (let r = 0; r < rowCount; r++) {
                maze[r] = [];
                for (let c = 0; c < columnCount; c++) {
                    if (r === 0 || r === rowCount - 1 || c === 0 || c === columnCount - 1) {
                        maze[r][c] = 1;
                    } else {
                        maze[r][c] = 0;
                    }
                }
            }
            
            // Add only a few strategic walls
            const safeWalls = [
                [3, 3], [3, 15], [17, 3], [17, 15],
                [5, 5], [5, 13], [15, 5], [15, 13],
                [7, 7], [7, 11], [13, 7], [13, 11]
            ];
            
            for (let [r, c] of safeWalls) {
                if (Math.random() > 0.3) {
                    maze[r][c] = 1;
                }
            }
            
            // Ensure ghost house
            for (let r = 9; r <= 11; r++) {
                for (let c = 8; c <= 10; c++) {
                    if (r === 9 && c === 9) {
                        maze[r][c] = 2;
                    } else if (r === 10 && (c === 8 || c === 10)) {
                        maze[r][c] = 4;
                    } else if (r === 11 && c === 9) {
                        maze[r][c] = 4;
                    } else if (r >= 9 && r <= 11 && c >= 8 && c <= 10) {
                        maze[r][c] = 2;
                    }
                }
            }
            
            ensureCriticalPaths();
        }

        function initGame() {
            generateMaze();
            
            // Don't reset score and lives on level up, only on new game
            if (level === 1) {
                score = 0;
                lives = 3;
            }
            
            currentMode = 'scatter';
            modeTimer = 0;
            frightenedTimer = 0;
            currentWave = 0;
            updateScore();
            updateLives();
            updateLevel();
            
            // Hide modals
            document.getElementById('gameOverModal').style.display = 'none';
            document.getElementById('victoryModal').style.display = 'none';
            
            dots = [];
            powerPellets = [];
            for (let r = 0; r < rowCount; r++) {
                for (let c = 0; c < columnCount; c++) {
                    if (maze[r][c] === 0) {
                        dots.push({x: c * tileSize + tileSize/2, y: r * tileSize + tileSize/2, eaten: false});
                    } else if (maze[r][c] === 3) {
                        powerPellets.push({x: c * tileSize + tileSize/2, y: r * tileSize + tileSize/2, eaten: false});
                    }
                }
            }
            
            // Ensure Pac-Man spawn is clear
            pacman.x = 9 * tileSize + tileSize/2;
            pacman.y = 15 * tileSize + tileSize/2;
            pacman.dir = {x: 0, y: 0};
            pacman.nextDir = {x: 0, y: 0};
            
            // Verify spawn is not trapped
            let spawnClear = false;
            const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
            for (let [dr, dc] of dirs) {
                let nr = 15 + dr;
                let nc = 9 + dc;
                if (nr >= 0 && nr < rowCount && nc >= 0 && nc < columnCount && maze[nr][nc] !== 1) {
                    spawnClear = true;
                    break;
                }
            }
            
            if (!spawnClear) {
                generateMaze();
                initGame();
                return;
            }
            
            // Calculate ghost count based on level (max 4)
            let ghostCount = Math.min(baseDifficulty.ghostCount + Math.floor((level - 1) / 2), 4);
            
            ghosts = [];
            const startPositions = [
                {x: 9, y: 9},
                {x: 8, y: 10},
                {x: 9, y: 10},
                {x: 10, y: 10}
            ];
            
            // Calculate ghost speed increase per level (10% per level, max 50% increase)
            let speedMultiplier = 1 + Math.min((level - 1) * 0.1, 0.5);
            
            for (let i = 0; i < ghostCount; i++) {
                ghosts.push({
                    x: startPositions[i].x * tileSize + tileSize/2,
                    y: startPositions[i].y * tileSize + tileSize/2,
                    dir: {x: 0, y: -1},
                    type: i % 4,
                    mode: 'scatter',
                    frightened: false,
                    eaten: false,
                    speed: baseDifficulty.ghostSpeed * speedMultiplier,
                    inHouse: i > 0,
                    releaseTimer: i * 2000
                });
            }
        }

        function backToMenu() {
            gameRunning = false;
            countdownActive = false;
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('landingPage').style.display = 'flex';
            document.getElementById('playBtn').disabled = true;
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            selectedDifficulty = null;
            baseDifficulty = null;
            level = 1;
        }

        function backToMenuFromModal() {
            document.getElementById('gameOverModal').style.display = 'none';
            document.getElementById('victoryModal').style.display = 'none';
            backToMenu();
        }

        function retryGame() {
            document.getElementById('gameOverModal').style.display = 'none';
            level = 1;
            score = 0;
            // Reset difficulty to base
            if (baseDifficulty) {
                currentDifficulty = JSON.parse(JSON.stringify(baseDifficulty));
            }
            initGame();
            startCountdown();
        }

        function nextLevel() {
            // Hide victory modal
            document.getElementById('victoryModal').style.display = 'none';
            
            // Increment level
            level++;
            
            // Show level announcement
            const countdownEl = document.getElementById('countdown');
            countdownEl.style.display = 'block';
            countdownEl.textContent = 'LEVEL ' + level;
            countdownEl.style.fontSize = '60px';
            
            setTimeout(() => {
                countdownEl.style.fontSize = '120px';
                initGame();
                startCountdown();
            }, 1500);
        }

        function showGameOver() {
            gameRunning = false;
            document.getElementById('finalScoreGameOver').textContent = 'SCORE: ' + score + ' | LEVEL: ' + level;
            document.getElementById('gameOverModal').style.display = 'flex';
        }

        function showVictory() {
            gameRunning = false;
            document.getElementById('finalScoreVictory').textContent = 'SCORE: ' + score + ' | LEVEL: ' + level;
            document.getElementById('victoryModal').style.display = 'flex';
        }

        document.addEventListener('keydown', function(e) {
            if (!gameRunning || countdownActive) return;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    pacman.nextDir = {x: 0, y: -1};
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    pacman.nextDir = {x: 0, y: 1};
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    pacman.nextDir = {x: -1, y: 0};
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    pacman.nextDir = {x: 1, y: 0};
                    break;
            }
        });

        function gameLoop() {
            if (!gameRunning) return;
            
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            frameCount++;
            
            if (frightenedTimer > 0) {
                frightenedTimer -= 16;
                if (frightenedTimer <= 0) {
                    endFrightenedMode();
                }
            } else {
                modeTimer += 16;
                let scatterTime = currentDifficulty.scatterTime;
                let chaseTime = currentDifficulty.chaseTime;
                let currentDuration = currentMode === 'scatter' ? scatterTime : chaseTime;
                
                if (modeTimer >= currentDuration) {
                    modeTimer = 0;
                    if (currentMode === 'scatter') {
                        currentMode = 'chase';
                    } else {
                        currentMode = 'scatter';
                        currentWave++;
                    }
                    ghosts.forEach(g => {
                        if (!g.eaten && !g.frightened) {
                            g.dir.x *= -1;
                            g.dir.y *= -1;
                        }
                    });
                }
            }
            
            updatePacman();
            ghosts.forEach(g => updateGhost(g));
            
            particles = particles.filter(p => {
                p.life--;
                p.x += p.vx;
                p.y += p.vy;
                return p.life > 0;
            });
            
            // Check victory condition - stop game and show popup
            if (dots.every(d => d.eaten) && powerPellets.every(p => p.eaten)) {
                showVictory();
                return;
            }
        }

        function updatePacman() {
            if (pacman.nextDir.x !== 0 || pacman.nextDir.y !== 0) {
                let nextX = pacman.x + pacman.nextDir.x * pacman.speed;
                let nextY = pacman.y + pacman.nextDir.y * pacman.speed;
                if (!checkWallCollision(nextX, nextY, 12)) {
                    pacman.dir = {...pacman.nextDir};
                }
            }
            
            let newX = pacman.x + pacman.dir.x * pacman.speed;
            let newY = pacman.y + pacman.dir.y * pacman.speed;
            
            if (newX < 0) newX = boardWidth;
            if (newX > boardWidth) newX = 0;
            
            if (!checkWallCollision(newX, newY, 12)) {
                pacman.x = newX;
                pacman.y = newY;
            }
            
            pacman.mouthOpen += pacman.mouthSpeed;
            if (pacman.mouthOpen > 1 || pacman.mouthOpen < 0) {
                pacman.mouthSpeed *= -1;
            }
            
            // Improved dot collision - check based on tile position rather than exact distance
            let pacTileX = Math.floor(pacman.x / tileSize);
            let pacTileY = Math.floor(pacman.y / tileSize);
            
            dots.forEach(dot => {
                if (!dot.eaten) {
                    let dotTileX = Math.floor(dot.x / tileSize);
                    let dotTileY = Math.floor(dot.y / tileSize);
                    
                    // Eat dot if Pac-Man is on the same tile or very close
                    let dist = distance(pacman.x, pacman.y, dot.x, dot.y);
                    let sameTile = (pacTileX === dotTileX && pacTileY === dotTileY);
                    
                    if (sameTile || dist < 15) {
                        dot.eaten = true;
                        score += 10;
                        updateScore();
                    }
                }
            });
            
            powerPellets.forEach(pellet => {
                if (!pellet.eaten) {
                    let pelletTileX = Math.floor(pellet.x / tileSize);
                    let pelletTileY = Math.floor(pellet.y / tileSize);
                    
                    let dist = distance(pacman.x, pacman.y, pellet.x, pellet.y);
                    let sameTile = (pacTileX === pelletTileX && pacTileY === pelletTileY);
                    
                    if (sameTile || dist < 18) {
                        pellet.eaten = true;
                        score += 50;
                        startFrightenedMode();
                        updateScore();
                    }
                }
            });
        }

        function updateGhost(g) {
            if (g.inHouse) {
                g.releaseTimer -= 16;
                if (g.releaseTimer <= 0) {
                    g.y -= g.speed;
                    if (g.y <= 9 * tileSize + tileSize/2) {
                        g.inHouse = false;
                        g.x = 9 * tileSize + tileSize/2;
                    }
                }
                return;
            }
            
            if (g.eaten) {
                g.mode = 'spawn';
            } else if (g.frightened) {
                g.mode = 'frightened';
            } else {
                g.mode = currentMode;
            }
            
            let target = getGhostTarget(g);
            let possibleDirs = getPossibleDirections(g);
            
            if (possibleDirs.length > 0) {
                if (g.mode === 'frightened') {
                    g.dir = possibleDirs[Math.floor(Math.random() * possibleDirs.length)];
                } else {
                    let bestDir = possibleDirs[0];
                    let bestDist = Infinity;
                    
                    possibleDirs.forEach(dir => {
                        let nextX = g.x + dir.x * g.speed * 2;
                        let nextY = g.y + dir.y * g.speed * 2;
                        let dist = distance(nextX, nextY, target.x, target.y);
                        
                        if (dist < bestDist || (dist === bestDist && getDirPriority(dir) < getDirPriority(bestDir))) {
                            bestDist = dist;
                            bestDir = dir;
                        }
                    });
                    
                    g.dir = bestDir;
                }
            }
            
            let speed = g.frightened ? g.speed * 0.5 : (g.eaten ? g.speed * 2 : g.speed);
            let newX = g.x + g.dir.x * speed;
            let newY = g.y + g.dir.y * speed;
            
            if (newX < 0) newX = boardWidth;
            if (newX > boardWidth) newX = 0;
            
            if (!checkWallCollision(newX, newY, 14)) {
                g.x = newX;
                g.y = newY;
            }
            
            if (distance(g.x, g.y, pacman.x, pacman.y) < 20) {
                if (g.frightened && !g.eaten) {
                    g.eaten = true;
                    g.frightened = false;
                    score += 200;
                    updateScore();
                    createParticles(g.x, g.y, ghostTypes[g.type].color);
                } else if (!g.eaten) {
                    loseLife();
                }
            }
            
            if (g.eaten && distance(g.x, g.y, 9 * tileSize + tileSize/2, 10 * tileSize + tileSize/2) < 10) {
                g.eaten = false;
                g.inHouse = true;
                g.releaseTimer = 1000;
            }
        }

        function getGhostTarget(g) {
            let type = ghostTypes[g.type];
            
            if (g.mode === 'spawn') {
                return {x: 9 * tileSize + tileSize/2, y: 10 * tileSize + tileSize/2};
            }
            
            if (g.mode === 'scatter' || g.mode === 'frightened') {
                return {x: type.scatterX * tileSize, y: type.scatterY * tileSize};
            }
            
            let pacTileX = Math.floor(pacman.x / tileSize);
            let pacTileY = Math.floor(pacman.y / tileSize);
            
            switch(type.name) {
                case 'blinky':
                    return {x: pacman.x, y: pacman.y};
                case 'pinky':
                    let offsetX = pacman.dir.x * 4 * tileSize;
                    let offsetY = pacman.dir.y * 4 * tileSize;
                    if (pacman.dir.y === -1) offsetX = -4 * tileSize;
                    return {x: pacman.x + offsetX, y: pacman.y + offsetY};
                case 'inky':
                    let blinky = ghosts[0];
                    let pivotX = pacman.x + pacman.dir.x * 2 * tileSize;
                    let pivotY = pacman.y + pacman.dir.y * 2 * tileSize;
                    if (pacman.dir.y === -1) pivotX -= 2 * tileSize;
                    return {
                        x: pivotX + (pivotX - blinky.x),
                        y: pivotY + (pivotY - blinky.y)
                    };
                case 'clyde':
                    let dist = distance(g.x, g.y, pacman.x, pacman.y);
                    if (dist > 8 * tileSize) {
                        return {x: pacman.x, y: pacman.y};
                    } else {
                        return {x: type.scatterX * tileSize, y: type.scatterY * tileSize};
                    }
            }
            return {x: pacman.x, y: pacman.y};
        }

        function getPossibleDirections(g) {
            let dirs = [
                {x: 0, y: -1},
                {x: -1, y: 0},
                {x: 0, y: 1},
                {x: 1, y: 0}
            ];
            
            let validDirs = dirs.filter(dir => {
                if (g.mode !== 'frightened' && dir.x === -g.dir.x && dir.y === -g.dir.y) {
                    return false;
                }
                
                let tileX = Math.floor(g.x / tileSize);
                let tileY = Math.floor(g.y / tileSize);
                let isForbidden = (tileX === 9 && (tileY === 7 || tileY === 19)) ||
                                 ((tileX === 4 || tileX === 14) && tileY === 7);
                
                if (isForbidden && dir.y === -1 && g.mode !== 'frightened') {
                    return false;
                }
                
                let nextX = g.x + dir.x * g.speed * 2;
                let nextY = g.y + dir.y * g.speed * 2;
                return !checkWallCollision(nextX, nextY, 14);
            });
            
            return validDirs;
        }

        function getDirPriority(dir) {
            if (dir.y === -1) return 0;
            if (dir.x === -1) return 1;
            if (dir.y === 1) return 2;
            return 3;
        }

        function startFrightenedMode() {
            frightenedTimer = currentDifficulty.frightenedTime;
            ghosts.forEach(g => {
                if (!g.eaten && !g.inHouse) {
                    g.frightened = true;
                    g.dir.x *= -1;
                    g.dir.y *= -1;
                }
            });
        }

        function endFrightenedMode() {
            ghosts.forEach(g => {
                g.frightened = false;
            });
        }

        function checkWallCollision(x, y, radius) {
            let left = Math.floor((x - radius) / tileSize);
            let right = Math.floor((x + radius) / tileSize);
            let top = Math.floor((y - radius) / tileSize);
            let bottom = Math.floor((y + radius) / tileSize);
            
            for (let r = top; r <= bottom; r++) {
                for (let c = left; c <= right; c++) {
                    if (r < 0 || r >= rowCount || c < 0 || c >= columnCount) continue;
                    if (maze[r][c] === 1) {
                        let tileX = c * tileSize;
                        let tileY = r * tileSize;
                        if (x + radius > tileX && x - radius < tileX + tileSize &&
                            y + radius > tileY && y - radius < tileY + tileSize) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function loseLife() {
            lives--;
            updateLives();
            createParticles(pacman.x, pacman.y, '#ffff00');
            
            if (lives <= 0) {
                showGameOver();
            } else {
                setTimeout(() => {
                    pacman.x = 9 * tileSize + tileSize/2;
                    pacman.y = 15 * tileSize + tileSize/2;
                    pacman.dir = {x: 0, y: 0};
                    pacman.nextDir = {x: 0, y: 0};
                    
                    ghosts.forEach((g, i) => {
                        g.x = (8 + i % 3) * tileSize + tileSize/2;
                        g.y = (9 + Math.floor(i / 3)) * tileSize + tileSize/2;
                        g.dir = {x: 0, y: -1};
                        g.inHouse = i > 0;
                        g.releaseTimer = i * 2000;
                    });
                }, 1000);
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 30,
                    color: color
                });
            }
        }

        function distance(x1, y1, x2, y2) {
            return Math.sqrt((x2-x1)**2 + (y2-y1)**2);
        }

        function updateScore() {
            document.getElementById('score').textContent = 'SCORE: ' + score;
        }

        function updateLives() {
            let hearts = '❤️'.repeat(lives);
            document.getElementById('lives').textContent = 'LIVES: ' + hearts;
        }

        function updateLevel() {
            document.getElementById('level-display').textContent = 'LEVEL: ' + level;
        }

        function draw() {
            context.fillStyle = 'black';
            context.fillRect(0, 0, boardWidth, boardHeight);
            
            for (let r = 0; r < rowCount; r++) {
                for (let c = 0; c < columnCount; c++) {
                    if (maze[r][c] === 1) {
                        context.fillStyle = '#2121de';
                        context.fillRect(c * tileSize, r * tileSize, tileSize, tileSize);
                        context.strokeStyle = '#0000aa';
                        context.lineWidth = 2;
                        context.strokeRect(c * tileSize, r * tileSize, tileSize, tileSize);
                    }
                }
            }
            
            context.fillStyle = '#ffb897';
            dots.forEach(dot => {
                if (!dot.eaten) {
                    context.beginPath();
                    context.arc(dot.x, dot.y, 3, 0, Math.PI * 2);
                    context.fill();
                }
            });
            
            context.fillStyle = '#ffb897';
            let pulse = Math.sin(frameCount * 0.1) * 2 + 6;
            powerPellets.forEach(pellet => {
                if (!pellet.eaten) {
                    context.beginPath();
                    context.arc(pellet.x, pellet.y, pulse, 0, Math.PI * 2);
                    context.fill();
                }
            });
            
            context.save();
            context.translate(pacman.x, pacman.y);
            
            let angle = 0;
            if (pacman.dir.x === 1) angle = 0;
            else if (pacman.dir.x === -1) angle = Math.PI;
            else if (pacman.dir.y === -1) angle = -Math.PI/2;
            else if (pacman.dir.y === 1) angle = Math.PI/2;
            
            context.rotate(angle);
            
            context.fillStyle = '#ffff00';
            context.beginPath();
            let mouthAngle = pacman.mouthOpen * 0.3;
            context.arc(0, 0, 13, mouthAngle, Math.PI * 2 - mouthAngle);
            context.lineTo(0, 0);
            context.fill();
            context.restore();
            
            ghosts.forEach(g => {
                if (g.inHouse) return;
                
                let color = ghostTypes[g.type].color;
                if (g.frightened) {
                    color = (Math.floor(frameCount / 10) % 2 === 0) ? '#2121de' : '#ffffff';
                } else if (g.eaten) {
                    color = '#222';
                }
                
                context.fillStyle = color;
                context.beginPath();
                context.arc(g.x, g.y - 4, 12, Math.PI, 0);
                context.lineTo(g.x + 12, g.y + 12);
                for (let i = 1; i <= 3; i++) {
                    context.lineTo(g.x + 12 - i * 8, g.y + 8 + (i % 2) * 4);
                }
                context.lineTo(g.x - 12, g.y + 12);
                context.fill();
                
                if (!g.frightened || g.eaten) {
                    context.fillStyle = 'white';
                    context.beginPath();
                    context.arc(g.x - 4, g.y - 6, 4, 0, Math.PI * 2);
                    context.arc(g.x + 4, g.y - 6, 4, 0, Math.PI * 2);
                    context.fill();
                    
                    context.fillStyle = g.eaten ? '#555' : 'blue';
                    let lookX = pacman.x > g.x ? 1 : -1;
                    let lookY = pacman.y > g.y ? 1 : -1;
                    context.beginPath();
                    context.arc(g.x - 4 + lookX * 2, g.y - 6 + lookY * 2, 2, 0, Math.PI * 2);
                    context.arc(g.x + 4 + lookX * 2, g.y - 6 + lookY * 2, 2, 0, Math.PI * 2);
                    context.fill();
                } else {
                    context.fillStyle = '#ffb897';
                    context.beginPath();
                    context.arc(g.x - 4, g.y - 4, 2, 0, Math.PI * 2);
                    context.arc(g.x + 4, g.y - 4, 2, 0, Math.PI * 2);
                    context.fill();
                }
            });
            
            particles.forEach(p => {
                context.fillStyle = p.color;
                context.globalAlpha = p.life / 30;
                context.fillRect(p.x - 2, p.y - 2, 4, 4);
            });
            context.globalAlpha = 1;
        }
    </script>
</body>
